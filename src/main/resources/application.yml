spring:
  h2:
    console:
      enabled: 'true'
  datasource:
    url: jdbc:h2:mem:testdb
    platform: h2
    username: sa
    driver-class-name: org.h2.Driver
  data:
    redis:
      # Dirección donde está corriendo tu servidor Redis (usualmente localhost en desarrollo)
      host: localhost
      # Mi puerto por defecto
      port: 6379
    jpa:
      repositories:
        bootstrap-mode: default
  jpa:
    properties:
      hibernate:
        generate_statistics: 'true'
        format_sql: 'true'
    defer-datasource-initialization: 'true'
    show-sql: 'true'
logging:
  level:
    org:
      hibernate:
        stat: debug
        type: trace
server:
  port: 8082

management:
  endpoint:
    shutdown:
      enabled: true

patron:
  password: ^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=])(?=\\S+$).{8,20}$